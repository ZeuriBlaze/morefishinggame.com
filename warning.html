<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resize Required</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f172a;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      background: white;
      padding: 25px;
      border-radius: 12px;
      text-align: center;
      max-width: 400px;
    }

    .key {
      background: #ddd;
      padding: 5px 10px;
      border-radius: 6px;
    }

    button {
      margin-top: 10px;
      padding: 8px 14px;
      border: none;
      background: #2563eb;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }

    label {
      display: block;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Screen Too Large</h2>
  <p>Shrink your screen to about 80%</p>
  <p><span class="key">Ctrl</span> + <span class="key">-</span></p>

  <label>
    <input type="checkbox" id="dontShow">
    Don’t show again
  </label>

  <button onclick="goBack()">Got it</button>
</div>

<script>
  function goBack() {
    const checked = document.getElementById("dontShow").checked;

    if (checked) {
      localStorage.setItem("skipResizeWarning", "true");
    }

    window.location.href = "/";
  }

  function checkFix() {
    if (window.innerWidth <= 1200) {
      window.location.href = "/";
    }
  }

  window.addEventListener("resize", checkFix);
</script>

</body>
</html>
