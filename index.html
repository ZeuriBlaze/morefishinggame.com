<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screen Size Warning</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0f172a;
      color: #111827;
    }

    #warning-screen {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.95);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      backdrop-filter: blur(6px);
      animation: fadeIn 0.3s ease;
    }

    .warning-card {
      background: white;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      animation: slideUp 0.35s ease;
    }

    .icon {
      font-size: 42px;
      margin-bottom: 10px;
    }

    h1 {
      margin: 10px 0 12px;
      font-size: 22px;
      color: #0f172a;
    }

    p {
      margin: 8px 0;
      color: #475569;
      font-size: 15px;
      line-height: 1.5;
    }

    .shortcut {
      display: inline-flex;
      gap: 6px;
      align-items: center;
      justify-content: center;
      margin-top: 14px;
      font-weight: 600;
    }

    .key {
      background: #e2e8f0;
      padding: 6px 10px;
      border-radius: 6px;
      font-size: 14px;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.15);
    }

    .button {
      margin-top: 20px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    .button:hover {
      background: #1d4ed8;
    }

    .button:active {
      transform: scale(0.96);
    }

    #main-content {
      padding: 40px;
      color: white;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>

<div id="warning-screen">
  <div class="warning-card">
    <div class="icon">⚠️</div>
    <h1>Screen Too Large</h1>
    <p>For the best experience, please resize your browser window to about <strong>80%</strong>.</p>
    <p>You can quickly zoom out using:</p>

    <div class="shortcut">
      <span class="key">Ctrl</span>
      <span>+</span>
      <span class="key">-</span>
    </div>

    <button class="button" onclick="dismissWarning()">Got it</button>
  </div>
</div>

<div id="main-content">
  <h1>Your App Content</h1>
  <p>This is your main app.</p>
</div>

<script>
  let dismissed = false;

  function checkScreenSize() {
    const warning = document.getElementById('warning-screen');

    if (window.innerWidth > 1200 && !dismissed) {
      warning.style.display = 'flex';
    } else {
      warning.style.display = 'none';
    }
  }

  function dismissWarning() {
    dismissed = true;
    document.getElementById('warning-screen').style.display = 'none';
  }

  window.addEventListener('load', checkScreenSize);
  window.addEventListener('resize', checkScreenSize);
</script>

</body>
</html>
