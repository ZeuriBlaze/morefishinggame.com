<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resize Required</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 18px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.25);
      animation: fadeIn 0.3s ease;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 22px;
    }

    p {
      color: #555;
      font-size: 15px;
    }

    .shortcut {
      margin-top: 12px;
      font-weight: bold;
    }

    .key {
      background: #e2e8f0;
      padding: 6px 10px;
      border-radius: 6px;
      margin: 0 3px;
      display: inline-block;
    }

    button {
      margin-top: 18px;
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: #2563eb;
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background: #1d4ed8;
    }

    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
<body>

<div class="card">
  <h1>⚠️ Screen Too Large</h1>
  <p>Please shrink your screen to about <strong>80%</strong> for the best experience.</p>

  <div class="shortcut">
    <span class="key">Ctrl</span> + <span class="key">-</span>
  </div>

  <button onclick="goBack()">Got it</button>
</div>

<script>
  function goBack() {
    window.location.href = "../";
  }

  function checkFix() {
    if (window.innerWidth <= 1200) {
      window.location.href = "../";
    }
  }

  window.addEventListener("resize", checkFix);
</script>

</body>
</html>
